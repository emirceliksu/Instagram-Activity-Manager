name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: InstagramManager-Linux
            executable_path: dist/InstagramManager
          - os: windows-latest
            artifact_name: InstagramManager-Windows.exe
            executable_path: dist/InstagramManager.exe
          - os: macos-latest
            artifact_name: InstagramManager-Mac
            executable_path: dist/InstagramManager

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "InstagramManager" --add-data "modules${{ matrix.os == 'windows-latest' && ';' || ':' }}modules" --add-data "utils${{ matrix.os == 'windows-latest' && ';' || ':' }}utils" --add-data "logo.png${{ matrix.os == 'windows-latest' && ';' || ':' }}." instagram_manager.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            InstagramManager-Linux/InstagramManager
            InstagramManager-Windows.exe/InstagramManager.exe
            InstagramManager-Mac/InstagramManager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
