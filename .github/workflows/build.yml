name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: InstagramManager-Windows-x64.zip
            executable_name: InstagramManager.exe
          - os: ubuntu-latest
            arch: x64
            artifact_name: InstagramManager-Linux-x64.tar.gz
            executable_name: InstagramManager
          - os: macos-13
            arch: Intel-x64
            artifact_name: InstagramManager-MacOS-Intel.tar.gz
            executable_name: InstagramManager
          - os: macos-latest
            arch: Apple-Silicon
            artifact_name: InstagramManager-MacOS-ARM.tar.gz
            executable_name: InstagramManager

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --name "InstagramManager" \
            --add-data "modules${{ matrix.os == 'windows-latest' && ';' || ':' }}modules" \
            --add-data "utils${{ matrix.os == 'windows-latest' && ';' || ':' }}utils" \
            --add-data "logo.png${{ matrix.os == 'windows-latest' && ';' || ':' }}." \
            instagram_manager.py

      - name: Compress Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/InstagramManager.exe -DestinationPath dist/${{ matrix.artifact_name }}

      - name: Compress Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist && tar -czvf ${{ matrix.artifact_name }} ${{ matrix.executable_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            */InstagramManager-Windows-x64.zip
            */InstagramManager-Linux-x64.tar.gz
            */InstagramManager-MacOS-Intel.tar.gz
            */InstagramManager-MacOS-ARM.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
